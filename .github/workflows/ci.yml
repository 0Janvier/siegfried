name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: TypeScript typecheck
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test anonymizer regression
        run: bun run test

  rust-check:
    name: Rust backend check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun (needed by tauri-build)
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        run: bun install --frozen-lockfile

      - name: Install external tools (for tests)
        run: brew install poppler tesseract tesseract-lang

      - name: Create tools resource placeholder
        # tauri.conf.json references src-tauri/tools/ as a bundle resource,
        # but the directory is gitignored (populated by scripts/bundle-tools.sh
        # before distribution builds). Create an empty placeholder so
        # cargo check / cargo test can run on a fresh clone.
        run: mkdir -p src-tauri/tools && touch src-tauri/tools/.gitkeep

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib
