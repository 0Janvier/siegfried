<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient for the S fading from solid to invisible -->
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5696AB" stop-opacity="1"/>
      <stop offset="45%" stop-color="#5696AB" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#5696AB" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#5696AB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5696AB" stop-opacity="0"/>
    </linearGradient>
    <!-- Particle/pixel dissolve mask -->
    <mask id="dissolve">
      <rect width="512" height="512" fill="white"/>
      <!-- Progressive dissolve pixels on the right/bottom -->
      <rect x="320" y="280" width="12" height="12" fill="black" rx="2"/>
      <rect x="350" y="260" width="10" height="10" fill="black" rx="2"/>
      <rect x="340" y="310" width="14" height="14" fill="black" rx="2"/>
      <rect x="370" y="290" width="11" height="11" fill="black" rx="2"/>
      <rect x="360" y="340" width="9" height="9" fill="black" rx="2"/>
      <rect x="390" y="270" width="13" height="13" fill="black" rx="2"/>
      <rect x="380" y="320" width="10" height="10" fill="black" rx="2"/>
      <rect x="400" y="300" width="8" height="8" fill="black" rx="2"/>
      <rect x="395" y="350" width="12" height="12" fill="black" rx="2"/>
      <rect x="410" y="330" width="7" height="7" fill="black" rx="2"/>
      <rect x="420" y="280" width="9" height="9" fill="black" rx="2"/>
      <rect x="415" y="360" width="6" height="6" fill="black" rx="2"/>
    </mask>
    <!-- Scattered particles that have "detached" from the S -->
    <linearGradient id="particle-fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5696AB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5696AB" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="96" fill="#1c1c1e"/>

  <!-- The S letter, dissolving -->
  <g mask="url(#dissolve)">
    <text
      x="256" y="390"
      text-anchor="middle"
      font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
      font-weight="700"
      font-size="420"
      fill="url(#fade)"
      letter-spacing="-10"
    >S</text>
  </g>

  <!-- Scattered particles (pieces of the S flying away) -->
  <g fill="url(#particle-fade)">
    <rect x="360" y="180" width="8" height="8" rx="2" opacity="0.7" transform="rotate(15 364 184)"/>
    <rect x="380" y="160" width="6" height="6" rx="1.5" opacity="0.55"/>
    <rect x="395" y="195" width="7" height="7" rx="2" opacity="0.45" transform="rotate(-10 398 198)"/>
    <rect x="410" y="170" width="5" height="5" rx="1.5" opacity="0.35"/>
    <rect x="375" y="215" width="9" height="9" rx="2" opacity="0.5" transform="rotate(25 379 219)"/>
    <rect x="420" y="200" width="4" height="4" rx="1" opacity="0.25"/>
    <rect x="400" y="145" width="6" height="6" rx="1.5" opacity="0.3" transform="rotate(-20 403 148)"/>
    <rect x="430" y="185" width="5" height="5" rx="1.5" opacity="0.2"/>
    <rect x="440" y="210" width="3" height="3" rx="1" opacity="0.15"/>
    <rect x="390" y="240" width="7" height="7" rx="2" opacity="0.4" transform="rotate(30 393 243)"/>
    <rect x="415" y="230" width="5" height="5" rx="1.5" opacity="0.3"/>
    <rect x="435" y="250" width="4" height="4" rx="1" opacity="0.18"/>
    <rect x="450" y="230" width="3" height="3" rx="1" opacity="0.1"/>
    <!-- Lower particles -->
    <rect x="370" y="350" width="7" height="7" rx="2" opacity="0.5" transform="rotate(12 373 353)"/>
    <rect x="395" y="370" width="5" height="5" rx="1.5" opacity="0.35"/>
    <rect x="415" y="355" width="6" height="6" rx="1.5" opacity="0.25" transform="rotate(-15 418 358)"/>
    <rect x="430" y="380" width="4" height="4" rx="1" opacity="0.18"/>
    <rect x="445" y="360" width="3" height="3" rx="1" opacity="0.12"/>
  </g>

  <!-- Subtle "2" subscript -->
  <text
    x="395" y="430"
    font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
    font-weight="600"
    font-size="80"
    fill="#5696AB"
    opacity="0.5"
  >2</text>
</svg>
